<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>实时监测 - 智慧忆护</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .app-container {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(37, 99, 235, 0.3);
            animation: pulseRing 2s ease-out infinite;
        }
        @keyframes pulseRing {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            position: relative;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            animation: pulseRing 2s ease-out infinite;
        }
        .desktop-only { display: none; }
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (min-width: 768px) {
            .mobile-only { display: none !important; }
            .desktop-only { display: block !important; }
        }
        @media (max-width: 767px) {
            .mobile-only { display: block !important; }
            .desktop-only { display: none !important; }
        }
    </style>
</head>
<body>
    <!-- 移动端布局 -->
    <div class="mobile-only flex items-center justify-center min-h-screen">
        <div class="app-container flex flex-col">
            <!-- 顶部状态栏 -->
            <div class="px-6 pt-4 pb-2 flex justify-between items-center text-xs font-bold bg-white">
                <span id="clock">09:41</span>
                <div class="flex gap-1">
                    <iconify-icon class="text-gray-800" icon="mdi:signal"></iconify-icon>
                    <iconify-icon class="text-gray-800" icon="mdi:wifi"></iconify-icon>
                    <iconify-icon class="text-gray-800" icon="mdi:battery"></iconify-icon>
                </div>
            </div>

            <!-- 顶部标题栏 -->
            <div class="px-5 py-4 bg-white shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="live-dot"></div>
                    <h1 class="text-xl font-bold text-gray-800">实时监测</h1>
                </div>
                <a href="dashboard.html" class="text-sm text-blue-600 font-medium">返回</a>
            </div>

            <!-- 滚动内容区 -->
            <div class="flex-1 overflow-y-auto scroll-container pb-24">
                <!-- 统计看板 -->
                <div class="px-5 py-4">
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <p class="text-[10px] text-blue-600 font-medium mb-1">正在评估</p>
                            <p class="text-xl font-bold text-blue-900" id="mobile-active-count">0</p>
                        </div>
                        <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                            <p class="text-[10px] text-green-600 font-medium mb-1">今日已完成</p>
                            <p class="text-xl font-bold text-green-900" id="mobile-today-count">0</p>
                        </div>
                        <div class="bg-red-50 p-3 rounded-xl border border-red-100">
                            <p class="text-[10px] text-red-600 font-medium mb-1">高风险预警</p>
                            <p class="text-xl font-bold text-red-900" id="mobile-risk-count">0</p>
                        </div>
                    </div>
                </div>

                <!-- 正在评估 -->
                <div class="px-5 mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-lg font-bold text-gray-800">正在评估</h2>
                        <span class="text-xs text-gray-400" id="mobile-active-label">0 个会话</span>
                    </div>
                    <div class="space-y-3 overflow-y-auto pr-1" id="mobile-active-list" style="max-height: 200px;">
                        <!-- 动态渲染 -->
                    </div>
                </div>

                <!-- 最近完成 -->
                <div class="px-5 mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-lg font-bold text-gray-800">最近完成</h2>
                        <span class="text-xs text-gray-400" id="mobile-completed-label">0 个会话</span>
                    </div>
                    <div class="space-y-3 overflow-y-auto pr-1" id="mobile-completed-list" style="max-height: 160px;">
                        <!-- 动态渲染 -->
                    </div>
                </div>
            </div>

            <!-- 底部导航栏 -->
            <div class="absolute bottom-0 left-0 right-0 bg-white h-20 border-t border-gray-100 flex items-center justify-around pb-4">
                <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:home" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">工作台</span>
                </a>
                <a href="patients.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:account-group" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">患者列表</span>
                </a>
                <div class="flex flex-col items-center text-blue-600">
                    <iconify-icon icon="mdi:monitor-eye" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1 font-bold">实时监测</span>
                </div>
                <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:account" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">我的</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 桌面端布局 -->
    <div class="desktop-only" style="min-height: 100vh; padding: 20px; box-sizing: border-box;">
        <div class="max-w-7xl mx-auto">
            <!-- 顶部导航 -->
            <header class="bg-white rounded-2xl shadow-lg p-6 mb-6 slide-up">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                            <iconify-icon class="text-white text-2xl" icon="mdi:brain"></iconify-icon>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">智慧忆护</h1>
                            <p class="text-gray-500 text-sm">医护人员工作台</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-xl text-gray-700 hover:bg-gray-200 transition-colors">
                            <iconify-icon icon="mdi:arrow-left" width="20"></iconify-icon>
                            返回工作台
                        </a>
                        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                                <span id="user-initial">李</span>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800" id="welcome-name-desktop">李医生</p>
                                <p class="text-xs text-gray-500">社区健康服务中心</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 统计看板 -->
            <div class="grid grid-cols-4 gap-6 mb-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">正在评估</p>
                        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:progress-clock" width="20" class="text-blue-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-blue-600" id="desktop-active-count">0</p>
                    <p class="text-xs text-gray-500 mt-2" id="desktop-active-label">0 个会话进行中</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">今日已完成</p>
                        <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:check-circle" width="20" class="text-green-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-green-600" id="desktop-today-count">0</p>
                    <p class="text-xs text-gray-500 mt-2" id="desktop-today-label">0 位患者</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">高风险预警</p>
                        <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:alert-circle" width="20" class="text-red-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-red-600" id="desktop-risk-count">0</p>
                    <p class="text-xs text-gray-500 mt-2">需重点关注</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">平均评估时长</p>
                        <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:timer" width="20" class="text-purple-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-purple-600" id="desktop-avg-time">0</p>
                    <p class="text-xs text-gray-500 mt-2">分钟/次</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- 正在评估 -->
                <div class="bg-white rounded-2xl p-6 shadow-lg slide-up" style="animation-delay: 0.1s">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">正在评估</h3>
                        <span class="text-sm text-gray-400" id="desktop-active-list-label">0 个会话</span>
                    </div>
                    <div class="space-y-3 overflow-y-auto pr-1" id="desktop-active-list" style="max-height: 180px;">
                        <!-- 动态渲染 -->
                    </div>
                </div>

                <!-- 最近完成 -->
                <div class="bg-white rounded-2xl p-6 shadow-lg slide-up" style="animation-delay: 0.2s">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-800">最近完成</h3>
                        <span class="text-sm text-gray-400" id="desktop-completed-list-label">0 个会话</span>
                    </div>
                    <div class="space-y-3 overflow-y-auto pr-1" id="desktop-completed-list" style="max-height: 160px;">
                        <!-- 动态渲染 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 时钟更新
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const clock = document.getElementById('clock');
            if (clock) clock.textContent = hours + ':' + minutes;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 用户信息显示
        const staffInfo = JSON.parse(localStorage.getItem('staff_info') || '{}');
        const staffName = staffInfo.name || '李医生';
        const desktopName = document.getElementById('welcome-name-desktop');
        const userInitial = document.getElementById('user-initial');
        if (desktopName) desktopName.textContent = staffName;
        if (userInitial) userInitial.textContent = staffName.charAt(0);

        // 获取所有评估会话
        function getAllSessions() {
            const SESSION_PREFIX = 'adcare_session_';
            const sessions = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(SESSION_PREFIX)) {
                    try {
                        sessions.push(JSON.parse(localStorage.getItem(key)));
                    } catch (e) {}
                }
            }
            return sessions;
        }

        // 获取患者信息映射
        function getPatientMap() {
            const map = {};
            try {
                const patients = JSON.parse(localStorage.getItem('portal_patients') || '[]');
                patients.forEach(p => {
                    if (p.id) map[String(p.id)] = p;
                });
            } catch (e) {}
            return map;
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '--';
            const d = new Date(timestamp);
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            return h + ':' + m;
        }

        // 计算已用时长（分钟）
        function getElapsedMinutes(startTime) {
            if (!startTime) return 0;
            return Math.floor((Date.now() - startTime) / (1000 * 60));
        }

        // 计算评估进度（模拟）
        function getProgress(session) {
            const elapsed = getElapsedMinutes(session.startTime);
            const total = 15;
            const progress = Math.min(Math.floor((elapsed / total) * 100), 95);
            return progress;
        }

        // 渲染正在评估的会话
        function renderActiveSessions(containerId, sessions, patientMap, isDesktop) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';

            if (sessions.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">暂无正在进行的评估</div>';
                return;
            }

            sessions.forEach(s => {
                const patient = patientMap[String(s.patientId)] || {};
                const name = patient.name || s.patientName || '未知患者';
                const age = patient.age ? patient.age + '岁' : '';
                const elapsed = getElapsedMinutes(s.startTime);
                const progress = getProgress(s);

                const div = document.createElement('div');
                if (isDesktop) {
                    div.className = 'flex items-center gap-4 p-4 bg-gray-50 rounded-xl';
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">${name.charAt(0)}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-gray-800">${name}</p>
                                ${age ? '<span class="text-xs text-gray-400">' + age + '</span>' : ''}
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 rounded-full" style="width: ${progress}%"></div>
                                </div>
                                <span class="text-xs text-gray-500">${progress}%</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="inline-flex items-center gap-1 px-2 py-1 bg-blue-100 text-blue-700 rounded-lg text-xs font-medium">
                                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                                进行中
                            </span>
                            <p class="text-xs text-gray-400 mt-1">已进行 ${elapsed} 分钟</p>
                        </div>
                    `;
                } else {
                    div.className = 'bg-white rounded-xl p-4 border border-gray-100 shadow-sm';
                    div.innerHTML = `
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-sm">${name.charAt(0)}</div>
                                <div>
                                    <p class="font-medium text-gray-800 text-sm">${name}</p>
                                    ${age ? '<p class="text-xs text-gray-400">' + age + '</p>' : ''}
                                </div>
                            </div>
                            <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-[10px] font-medium">
                                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                                进行中
                            </span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${progress}%"></div>
                            </div>
                            <span class="text-xs text-gray-500">${progress}%</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">已进行 ${elapsed} 分钟</p>
                    `;
                }
                container.appendChild(div);
            });
        }

        // 渲染已完成的会话
        function renderCompletedSessions(containerId, sessions, patientMap, isDesktop) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';

            if (sessions.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">暂无最近完成的评估</div>';
                return;
            }

            sessions.forEach(s => {
                const patient = patientMap[String(s.patientId)] || {};
                const name = patient.name || s.patientName || '未知患者';
                const age = patient.age ? patient.age + '岁' : '';
                const endTimeStr = formatTime(s.endTime);
                const riskLevel = s.riskLevel || getRiskLevel(s);
                const riskConfig = getRiskConfig(riskLevel);

                const div = document.createElement('div');
                if (isDesktop) {
                    div.className = 'flex items-center gap-4 p-4 bg-gray-50 rounded-xl';
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 font-bold">${name.charAt(0)}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-gray-800">${name}</p>
                                ${age ? '<span class="text-xs text-gray-400">' + age + '</span>' : ''}
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">完成时间 ${endTimeStr}</p>
                        </div>
                        <span class="px-2 py-1 ${riskConfig.bg} ${riskConfig.text} rounded-lg text-xs font-medium">${riskConfig.label}</span>
                    `;
                } else {
                    div.className = 'bg-white rounded-xl p-4 border border-gray-100 shadow-sm';
                    div.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-600 font-bold text-sm">${name.charAt(0)}</div>
                                <div>
                                    <p class="font-medium text-gray-800 text-sm">${name}</p>
                                    <p class="text-xs text-gray-400">完成时间 ${endTimeStr}</p>
                                </div>
                            </div>
                            <span class="px-2 py-0.5 ${riskConfig.bg} ${riskConfig.text} rounded text-[10px] font-medium">${riskConfig.label}</span>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
        }

        // 风险等级配置
        function getRiskConfig(level) {
            const configs = {
                low: { label: '低风险', bg: 'bg-green-100', text: 'text-green-700' },
                medium: { label: '中度风险', bg: 'bg-yellow-100', text: 'text-yellow-700' },
                high: { label: '高风险', bg: 'bg-red-100', text: 'text-red-700' }
            };
            return configs[level] || configs.low;
        }

        function getRiskLevel(session) {
            if (session.riskLevel) return session.riskLevel;
            const seed = String(session.patientId || session.patientName || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0);
            const rand = (seed * 9301 + 49297) % 233280;
            const val = rand / 233280;
            if (val < 0.33) return 'low';
            if (val < 0.66) return 'medium';
            return 'high';
        }

        // 主更新函数
        function updateRealtime() {
            const sessions = getAllSessions();
            const patientMap = getPatientMap();
            const now = Date.now();
            const todayStart = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()).getTime();

            // 分类会话
            const activeSessions = sessions.filter(s => s.startTime && !s.endTime);
            const completedSessions = sessions.filter(s => s.endTime && s.endTime >= todayStart).sort((a, b) => b.endTime - a.endTime);
            const allCompleted = sessions.filter(s => s.endTime).sort((a, b) => b.endTime - a.endTime);

            // 今日已完成患者数（去重）
            const todayPatientIds = new Set();
            allCompleted.forEach(s => {
                if (s.endTime >= todayStart && s.patientId) todayPatientIds.add(String(s.patientId));
            });

            // 高风险患者数
            let riskCount = 0;
            try {
                const patients = JSON.parse(localStorage.getItem('portal_patients') || '[]');
                patients.forEach(p => { if (p.status === 'risk') riskCount++; });
            } catch (e) {}

            // 平均评估时长
            let avgTime = 0;
            const completedWithDuration = allCompleted.filter(s => s.startTime && s.endTime);
            if (completedWithDuration.length > 0) {
                const totalDuration = completedWithDuration.reduce((sum, s) => sum + (s.endTime - s.startTime), 0);
                avgTime = Math.round(totalDuration / completedWithDuration.length / (1000 * 60));
            }

            // 更新移动端统计
            const mobileActive = document.getElementById('mobile-active-count');
            const mobileToday = document.getElementById('mobile-today-count');
            const mobileRisk = document.getElementById('mobile-risk-count');
            if (mobileActive) mobileActive.textContent = activeSessions.length;
            if (mobileToday) mobileToday.textContent = todayPatientIds.size;
            if (mobileRisk) mobileRisk.textContent = riskCount;

            // 更新桌面端统计
            const desktopActive = document.getElementById('desktop-active-count');
            const desktopToday = document.getElementById('desktop-today-count');
            const desktopRisk = document.getElementById('desktop-risk-count');
            const desktopAvg = document.getElementById('desktop-avg-time');
            if (desktopActive) desktopActive.textContent = activeSessions.length;
            if (desktopToday) desktopToday.textContent = todayPatientIds.size;
            if (desktopRisk) desktopRisk.textContent = riskCount;
            if (desktopAvg) desktopAvg.textContent = avgTime;

            // 更新标签
            const mobileActiveLabel = document.getElementById('mobile-active-label');
            const mobileCompletedLabel = document.getElementById('mobile-completed-label');
            const desktopActiveLabel = document.getElementById('desktop-active-label');
            const desktopTodayLabel = document.getElementById('desktop-today-label');
            const desktopActiveListLabel = document.getElementById('desktop-active-list-label');
            const desktopCompletedListLabel = document.getElementById('desktop-completed-list-label');

            if (mobileActiveLabel) mobileActiveLabel.textContent = activeSessions.length + ' 个会话';
            if (mobileCompletedLabel) mobileCompletedLabel.textContent = completedSessions.length + ' 个会话';
            if (desktopActiveLabel) desktopActiveLabel.textContent = activeSessions.length + ' 个会话进行中';
            if (desktopTodayLabel) desktopTodayLabel.textContent = todayPatientIds.size + ' 位患者';
            if (desktopActiveListLabel) desktopActiveListLabel.textContent = activeSessions.length + ' 个会话';
            if (desktopCompletedListLabel) desktopCompletedListLabel.textContent = completedSessions.length + ' 个会话';

            // 渲染列表
            renderActiveSessions('mobile-active-list', activeSessions, patientMap, false);
            renderCompletedSessions('mobile-completed-list', completedSessions.slice(0, 5), patientMap, false);
            renderActiveSessions('desktop-active-list', activeSessions, patientMap, true);
            renderCompletedSessions('desktop-completed-list', completedSessions.slice(0, 8), patientMap, true);
        }

        updateRealtime();
        setInterval(updateRealtime, 10000);
    </script>
</body>
</html>
