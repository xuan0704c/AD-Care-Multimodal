<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>筛查报告 - 智慧忆护</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/echarts.min.5.4.3.js"></script>
    <script src="mock-api.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .app-container {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="app-container flex flex-col">
        <!-- 顶部状态栏 -->
        <div class="px-6 pt-4 pb-2 flex justify-between items-center text-xs font-bold bg-white">
            <span id="clock">09:41</span>
            <div class="flex gap-1">
                <iconify-icon class="text-gray-800" icon="mdi:signal"></iconify-icon>
                <iconify-icon class="text-gray-800" icon="mdi:wifi"></iconify-icon>
                <iconify-icon class="text-gray-800" icon="mdi:battery"></iconify-icon>
            </div>
        </div>

        <!-- 顶部导航 -->
        <div class="px-5 py-4 bg-white shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a class="text-gray-600" href="report.html">
                    <iconify-icon icon="mdi:close" width="24"></iconify-icon>
                </a>
                <h1 class="text-xl font-bold text-gray-800">筛查报告</h1>
            </div>
            <div class="flex gap-4">
                <iconify-icon class="text-blue-600 cursor-pointer" icon="mdi:share-variant-outline" width="24" onclick="shareReport()"></iconify-icon>
                <iconify-icon class="text-gray-500 cursor-pointer" icon="mdi:printer-outline" width="24" onclick="window.print()"></iconify-icon>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto scroll-container p-4 space-y-6" id="report-content">
            <!-- 动态填充 -->
        </div>

        <!-- 底部固定按钮 -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 h-24 flex items-center gap-3">
            <button id="archive-btn" onclick="toggleArchive()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-sm">存档记录</button>
            <button onclick="sendToFamily()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-100">发送至家属APP</button>
        </div>
    </div>

    <script>
        // 登录状态检查
        if (sessionStorage.getItem('portal_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        // 更新时间和日期
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }


        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const SESSION_PREFIX = 'adcare_session_';
        const PATIENTS_KEY = 'portal_patients';
        const ARCHIVED_KEY = 'adcare_archived_reports';
        const sessionId = getQueryParam('sessionId') || 'default_report';

        function loadPatients() {
            const stored = localStorage.getItem(PATIENTS_KEY);
            if (stored) return JSON.parse(stored);
            return [];
        }

        function loadSession(sessionId) {
            if (!sessionId) return null;
            const key = SESSION_PREFIX + sessionId;
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        // 获取该患者的历史评估记录（用于趋势图）
        function getPatientHistory(patientId) {
            if (!patientId) return [];
            const history = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(SESSION_PREFIX)) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (String(data.patientId) === String(patientId) && data.endTime) {
                            history.push({
                                sessionId: data.sessionId || key.replace(SESSION_PREFIX, ''),
                                startTime: data.startTime,
                                endTime: data.endTime,
                                duration: Math.floor((data.endTime - data.startTime) / 1000)
                            });
                        }
                    } catch (e) {}
                }
            }
            return history.sort((a, b) => a.startTime - b.startTime);
        }

        function formatDate(timestamp) {
            if (!timestamp) return '--';
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '--';
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '0分';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            if (m > 0) return `${m}分${s > 0 ? s + '秒' : ''}`;
            return `${s}秒`;
        }

        // 基于评估时长生成一个模拟分数（仅供展示）
        function generateMockScore(duration) {
            // 时长在 2-10 分钟之间，分数在 65-95 之间波动
            const base = Math.min(Math.max(duration, 120), 600);
            const normalized = 65 + (1 - (base - 120) / 480) * 30;
            return Math.round(normalized);
        }

        // 基于分数获取风险等级
        function getRiskLevel(score) {
            if (score >= 85) return { level: '低风险', grade: 'LEVEL 0', color: 'text-green-600', bg: 'from-green-50 to-emerald-50', border: 'border-green-100', bar: 'bg-green-400' };
            if (score >= 75) return { level: '轻度风险', grade: 'LEVEL 1', color: 'text-yellow-600', bg: 'from-yellow-50 to-orange-50', border: 'border-yellow-100', bar: 'bg-yellow-400' };
            if (score >= 65) return { level: '中度风险', grade: 'LEVEL 2', color: 'text-orange-600', bg: 'from-orange-50 to-red-50', border: 'border-orange-100', bar: 'bg-orange-400' };
            return { level: '高风险', grade: 'LEVEL 3', color: 'text-red-600', bg: 'from-red-50 to-rose-50', border: 'border-red-100', bar: 'bg-red-400' };
        }

        async function renderReport() {
            const container = document.getElementById('report-content');

            // 显示加载状态
            container.innerHTML = `
                <div class="text-center py-12 text-gray-400">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
                    <p class="text-sm">正在生成评估报告...</p>
                </div>
            `;

            try {
                // 调用模拟API获取评估数据
                const assessmentData = await fetchAssessmentReport(sessionId);
                
                const patients = loadPatients();
                let patient = null;
                let patientName = '未知患者';
                let patientAge = '--';
                let patientGender = '--';
                let patientRoom = '--';
                
                // 如果有sessionId，尝试加载真实患者数据
                if (sessionId && !sessionId.startsWith('MOCK_')) {
                    const data = loadSession(sessionId);
                    if (data) {
                        patient = patients.find(p => String(p.id) === String(data.patientId));
                        patientName = patient ? patient.name : (data.patientName || '未知患者');
                        patientAge = patient ? patient.age : (data.patientAge || '--');
                        patientGender = patient ? patient.gender : (data.patientGender || '--');
                        patientRoom = patient ? patient.room : '--';
                    }
                }

                const score = assessmentData.score;
                const risk = assessmentData.riskAssessment;
                const languageCognition = assessmentData.languageCognition;

                const history = getPatientHistory(sessionId);
                const hasHistory = history.length >= 2;

            // 构建历史趋势数据（最多取最近7次）
            const chartLabels = [];
            const chartData = [];
            if (hasHistory) {
                const recent = history.slice(-7);
                recent.forEach((h, idx) => {
                    const d = new Date(h.startTime);
                    const label = `${d.getMonth() + 1}月${d.getDate()}日`;
                    chartLabels.push(label);
                    chartData.push(generateMockScore(h.duration));
                });
            }

                container.innerHTML = `
                    <!-- 患者基本信息卡片 -->
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center gap-4">
                        <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xl border-4 border-blue-50">
                            ${patientName.charAt(0)}
                        </div>
                        <div>
                            <h2 class="text-lg font-bold">${patientName} <span class="text-sm font-normal text-gray-500 ml-1">${patientAge}岁 · ${patientGender}</span></h2>
                            <p class="text-xs text-gray-400">报告编号：${assessmentData.sessionId}</p>
                            <p class="text-xs text-gray-400">采集时间：${formatDateTime(assessmentData.startTime)}</p>
                            ${patientRoom !== '--' ? `<p class="text-xs text-gray-400">房间号：${patientRoom}</p>` : ''}
                        </div>
                    </div>

                    <!-- 核心结论区 -->
                    <div class="bg-gradient-to-br ${risk.bg} p-6 rounded-3xl border ${risk.border} relative overflow-hidden">
                        <div class="absolute -top-4 -right-4 w-24 h-24 bg-white/20 rounded-full"></div>
                        <div class="relative z-10">
                            <p class="text-sm font-bold ${risk.color} mb-1">综合风险评估结果</p>
                            <div class="flex items-end gap-2 mb-4">
                                <span class="text-4xl font-black ${risk.color}">${risk.level}</span>
                                <span class="text-sm ${risk.color} opacity-60 pb-1 font-bold">预警等级：${risk.grade}</span>
                            </div>
                            <p class="text-xs leading-relaxed bg-white/50 p-3 rounded-xl border ${risk.border}/50">
                                ${risk.summary}
                            </p>
                        </div>
                    </div>

                    <!-- 历史趋势对比 -->
                    ${hasHistory ? `
                    <div class="bg-white p-5 rounded-3xl border border-gray-100">
                        <h3 class="text-sm font-bold mb-4 flex items-center gap-2">
                            <iconify-icon class="text-blue-600" icon="mdi:chart-line"></iconify-icon> 认知功能趋势对比
                        </h3>
                        <div class="w-full h-40" id="trendChart"></div>
                        <p class="text-[10px] text-gray-400 text-center mt-2">* 数据对比自过去 ${chartLabels.length} 次筛查记录</p>
                    </div>
                    ` : ''}

                    <!-- 详细维度拆解 -->
                    <div class="space-y-3">
                        <h3 class="text-sm font-bold px-1">详细维度拆解</h3>
                        <div class="bg-white p-4 rounded-2xl border border-gray-100 flex gap-4">
                            <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-600">
                                <iconify-icon icon="mdi:microphone" width="20"></iconify-icon>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-bold">语言与认知</span>
                                    <span class="text-xs ${risk.color} font-bold">${languageCognition.level}</span>
                                </div>
                                <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full ${risk.bar}" style="width: ${languageCognition.percentage}%"></div>
                                </div>
                                <p class="text-[10px] text-gray-400 mt-2">${languageCognition.description}</p>
                            </div>
                        </div>
                    </div>

                    <!-- 临床干预建议 -->
                    <div class="bg-blue-600 p-5 rounded-3xl text-white shadow-xl shadow-blue-200 mb-8">
                        <h3 class="text-sm font-bold mb-3 flex items-center gap-2">
                            <iconify-icon class="text-blue-200" icon="mdi:medical-bag"></iconify-icon> 社区干预及临床建议
                        </h3>
                        <ul class="text-xs space-y-2 opacity-90 leading-relaxed">
                            ${assessmentData.interventionSuggestions.map(suggestion => `<li>${suggestion}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="pb-24 text-center">
                        <p class="text-[10px] text-gray-400 italic">
                            报告由智慧忆护 AI 引擎自动生成<br/>
                            边缘计算平台序列号：EDGE-CNS-2026-X8
                        </p>
                    </div>
                `;

                // 初始化趋势图
                if (hasHistory && document.getElementById('trendChart')) {
                    const trendChart = echarts.init(document.getElementById('trendChart'));
                    trendChart.setOption({
                        grid: { top: 10, bottom: 20, left: 30, right: 10 },
                        xAxis: {
                            type: 'category',
                            data: chartLabels,
                            axisLine: { lineStyle: { color: '#f1f5f9' } },
                            axisLabel: { color: '#94a3b8', fontSize: 10 }
                        },
                        yAxis: {
                            type: 'value',
                        max: 100,
                        axisLabel: { color: '#94a3b8', fontSize: 10 },
                        splitLine: { lineStyle: { color: '#f8fafc' } }
                    },
                    series: [{
                        data: chartData,
                        type: 'line',
                        smooth: true,
                        symbolSize: 6,
                        itemStyle: { color: '#2563eb' },
                        lineStyle: { width: 3 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(37, 99, 235, 0.1)' },
                                { offset: 1, color: 'transparent' }
                            ])
                        }
                    }]
                    });
                }
            } catch (error) {
                console.error('生成报告失败:', error);
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        <iconify-icon icon="mdi:alert-circle-outline" width="48" class="mx-auto mb-2 opacity-50"></iconify-icon>
                        <p class="text-sm">报告生成失败，请重试</p>
                    </div>
                `;
            }
        }

        function shareReport() {
            if (navigator.share) {
                navigator.share({ title: 'AD-Care 筛查报告', text: '查看认知评估报告详情' });
            } else {
                alert('分享功能需在支持的环境中使用');
            }
        }

        function getArchivedList() {
            try {
                return JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '[]');
            } catch (e) {
                return [];
            }
        }

        function isArchived(sid) {
            return getArchivedList().includes(sid);
        }

        function toggleArchive() {
            const list = getArchivedList();
            const idx = list.indexOf(sessionId);
            if (idx > -1) {
                list.splice(idx, 1);
                localStorage.setItem(ARCHIVED_KEY, JSON.stringify(list));
                alert('已取消存档');
                updateArchiveBtn();
            } else {
                list.push(sessionId);
                localStorage.setItem(ARCHIVED_KEY, JSON.stringify(list));
                alert('报告已存档');
                updateArchiveBtn();
            }
        }

        function updateArchiveBtn() {
            const btn = document.getElementById('archive-btn');
            if (!btn) return;
            if (isArchived(sessionId)) {
                btn.textContent = '取消存档';
                btn.classList.remove('bg-gray-100', 'text-gray-600');
                btn.classList.add('bg-yellow-50', 'text-yellow-600');
            } else {
                btn.textContent = '存档记录';
                btn.classList.remove('bg-yellow-50', 'text-yellow-600');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            }
        }

        function sendToFamily() {
            alert('报告已发送至家属APP');
        }

        // 页面加载完成后渲染报告
        document.addEventListener('DOMContentLoaded', async function() {
            updateDateTime();
            setInterval(updateDateTime, 60000);
            await renderReport();
            updateArchiveBtn();
        });
    </script>
</body>
</html>
