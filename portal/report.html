<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>报告查询 - 智慧忆护</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .app-container {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 50;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            width: 100%;
            max-height: 85%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .report-card {
            transition: all 0.2s ease;
        }
        .report-card:active {
            transform: scale(0.98);
        }
        .desktop-only { display: none; }
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (min-width: 768px) {
            .mobile-only { display: none !important; }
            .desktop-only { display: block !important; }
        }
        @media (max-width: 767px) {
            .mobile-only { display: block !important; }
            .desktop-only { display: none !important; }
        }
    </style>
</head>
<body>
    <!-- 移动端布局 -->
    <div class="mobile-only flex items-center justify-center min-h-screen">
        <div class="app-container flex flex-col">
            <!-- 顶部状态栏 -->
            <div class="px-6 pt-4 pb-2 flex justify-between items-center text-xs font-bold bg-white">
                <span id="clock">09:41</span>
                <div class="flex gap-1">
                    <iconify-icon class="text-gray-800" icon="mdi:signal"></iconify-icon>
                    <iconify-icon class="text-gray-800" icon="mdi:wifi"></iconify-icon>
                    <iconify-icon class="text-gray-800" icon="mdi:battery"></iconify-icon>
                </div>
            </div>

            <!-- 顶部导航 -->
            <div class="px-5 py-4 bg-white shadow-sm flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">报告查询</h1>
                <div class="flex gap-4 text-gray-600 items-center">
                    <button id="mobile-edit-toggle" onclick="toggleEditMode()" class="text-sm font-bold text-blue-600 px-2 py-1 rounded-lg hover:bg-blue-50 transition-colors">编辑</button>
                    <iconify-icon class="relative" icon="mdi:bell-outline" width="24">
                        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                    </iconify-icon>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="px-4 py-3 bg-white">
                <div class="relative">
                    <iconify-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" icon="mdi:magnify" width="20"></iconify-icon>
                    <input type="text" id="search-input" placeholder="搜索患者姓名或报告编号" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <!-- 筛选Tab -->
            <div class="px-4 flex gap-4 text-sm font-medium border-b border-gray-100 bg-white">
                <button class="pb-2 border-b-2 border-blue-600 text-blue-600" id="tab-all" onclick="filterReports('all')">全部</button>
                <button class="pb-2 text-gray-500" id="tab-today" onclick="filterReports('today')">今日</button>
                <button class="pb-2 text-gray-500" id="tab-week" onclick="filterReports('week')">本周</button>
                <button class="pb-2 text-gray-500" id="tab-month" onclick="filterReports('month')">本月</button>
            </div>

            <!-- 统计看板 -->
            <div class="p-4 grid grid-cols-3 gap-3">
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <p class="text-[10px] text-blue-600 font-medium mb-1">报告总数</p>
                    <p class="text-xl font-bold text-blue-900" id="total-reports">0</p>
                </div>
                <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                    <p class="text-[10px] text-green-600 font-medium mb-1">今日新增</p>
                    <p class="text-xl font-bold text-green-900" id="today-reports">0</p>
                </div>
                <div class="bg-purple-50 p-3 rounded-xl border border-purple-100">
                    <p class="text-[10px] text-purple-600 font-medium mb-1">平均时长</p>
                    <p class="text-xl font-bold text-purple-900" id="avg-duration">0分</p>
                </div>
            </div>

            <!-- 报告列表 -->
            <div class="flex-1 overflow-y-auto scroll-container p-4 space-y-3 pb-24" id="report-list">
                <!-- 动态渲染 -->
            </div>

            <!-- 底部导航栏 -->
            <div class="absolute bottom-0 left-0 right-0 bg-white h-20 border-t border-gray-100 flex items-center justify-around pb-4">
                <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:home" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">工作台</span>
                </a>
                <a href="patients.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:account-group" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">患者列表</span>
                </a>
                <div class="flex flex-col items-center text-blue-600">
                    <iconify-icon icon="mdi:file-chart" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1 font-bold">报告查询</span>
                </div>
                <a href="profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                    <iconify-icon icon="mdi:account" width="24"></iconify-icon>
                    <span class="text-[10px] mt-1">我的</span>
                </a>
            </div>

            <!-- 报告详情模态框 -->
            <div class="modal-overlay" id="detail-modal">
                <div class="modal-content" id="detail-content">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 编辑报告模态框 -->
            <div class="modal-overlay" id="edit-modal">
                <div class="modal-content" id="edit-content">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 桌面端布局 -->
    <div class="desktop-only" style="min-height: 100vh; padding: 20px; box-sizing: border-box;">
        <div class="max-w-[1200px] mx-auto">
            <!-- 顶部导航 -->
            <header class="bg-white rounded-2xl shadow-lg p-6 mb-6 slide-up">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                            <iconify-icon class="text-white text-2xl" icon="mdi:brain"></iconify-icon>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">智慧忆护</h1>
                            <p class="text-gray-500 text-sm">报告查询</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="dashboard.html" class="flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors text-gray-700">
                            <iconify-icon icon="mdi:arrow-left" width="20"></iconify-icon>
                            <span>返回工作台</span>
                        </a>
                        <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                                <span id="desktop-user-initial">李</span>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800" id="desktop-user-name">李医生</p>
                                <p class="text-xs text-gray-500">社区健康服务中心</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 统计卡片 -->
            <div class="grid grid-cols-3 gap-4 mb-6 slide-up" style="animation-delay: 0.1s">
                <div class="bg-white rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">总报告数</p>
                        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:file-document" width="20" class="text-blue-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-blue-600" id="desktop-total-reports">0</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">本月报告数</p>
                        <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:calendar-month" width="20" class="text-green-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-green-600" id="desktop-month-reports">0</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between mb-4">
                        <p class="text-gray-500 text-sm">平均用时</p>
                        <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center">
                            <iconify-icon icon="mdi:timer-outline" width="20" class="text-purple-600"></iconify-icon>
                        </div>
                    </div>
                    <p class="text-3xl font-bold text-purple-600" id="desktop-avg-duration">0分</p>
                </div>
            </div>

            <!-- 筛选栏 + 报告列表 -->
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 slide-up" style="animation-delay: 0.2s">
                <!-- 渐变色标题栏 -->
                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-4 mb-6 text-white">
                    <h2 class="text-lg font-bold">报告列表</h2>
                    <p class="text-blue-100 text-sm">查看和管理所有患者评估报告</p>
                </div>

                <!-- 筛选栏 -->
                <div class="flex flex-wrap items-center gap-4 mb-6">
                    <div class="flex items-center gap-2 bg-gray-100 rounded-xl p-1">
                        <button class="desktop-tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white shadow-sm text-gray-800" id="desktop-tab-all" onclick="filterDesktopReports('all')">全部</button>
                        <button class="desktop-tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700" id="desktop-tab-week" onclick="filterDesktopReports('week')">近7天</button>
                        <button class="desktop-tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700" id="desktop-tab-last30days" onclick="filterDesktopReports('last30days')">近30天</button>
                    </div>
                    <div class="relative flex-1 min-w-[200px]">
                        <iconify-icon icon="mdi:search" width="20" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
                        <input type="text" id="desktop-search-input" placeholder="按患者姓名搜索..." class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">风险等级：</span>
                        <select id="desktop-status-filter" onchange="filterDesktopStatus(this.value)" class="px-4 py-2 bg-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">全部</option>
                            <option value="low">低风险</option>
                            <option value="medium">中度风险</option>
                            <option value="high">高风险</option>
                        </select>
                    </div>
                    <button id="desktop-edit-toggle" onclick="toggleEditMode()" class="px-4 py-2 bg-gray-100 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-200 transition-colors">编辑</button>
                </div>

                <!-- 表格 -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-100 text-sm text-gray-500">
                                <th class="pb-3 font-medium px-4">患者姓名</th>
                                <th class="pb-3 font-medium px-4">评估时间</th>
                                <th class="pb-3 font-medium px-4">报告编号</th>
                                <th class="pb-3 font-medium px-4">数据大小</th>
                                <th class="pb-3 font-medium px-4">风险等级</th>
                                <th class="pb-3 font-medium px-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="desktop-report-list" class="text-sm text-gray-700">
                            <!-- 动态渲染 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 底部版权 -->
            <footer class="text-center text-gray-400 text-sm py-6">
                <p>国家老年疾病临床医学研究中心 提供技术支持</p>
            </footer>
        </div>
    </div>

    <script>
        // 登录状态与角色检查
        if (sessionStorage.getItem('portal_logged_in') !== 'true' || sessionStorage.getItem('user_role') !== 'staff') {
            window.location.href = 'login.html';
        }

        // 更新时间和日期
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        // 显示已保存的用户名
        const savedUsername = localStorage.getItem('portal_username');
        if (savedUsername) {
            const desktopUserName = document.getElementById('desktop-user-name');
            const desktopUserInitial = document.getElementById('desktop-user-initial');
            if (desktopUserName) desktopUserName.textContent = savedUsername + '医生';
            if (desktopUserInitial) desktopUserInitial.textContent = savedUsername.charAt(0);
        }

        // ===== 报告数据管理 =====
        const SESSION_PREFIX = 'adcare_session_';
        const PATIENTS_KEY = 'portal_patients';
        const ARCHIVED_KEY = 'adcare_archived_reports';
        let currentFilter = 'all';
        let searchKeyword = '';
        let desktopStatusFilter = 'all';
        let isEditMode = false;

        function loadPatients() {
            const stored = localStorage.getItem(PATIENTS_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return [];
        }

        function loadReports() {
            const reports = [];
            const patients = loadPatients();
            const patientMap = {};
            patients.forEach(p => { patientMap[p.id] = p; });

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(SESSION_PREFIX)) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        const patient = data.patientId ? patientMap[data.patientId] : null;
                        reports.push({
                            sessionId: data.sessionId || key.replace(SESSION_PREFIX, ''),
                            patientId: data.patientId || null,
                            patientName: patient ? patient.name : (data.patientName || '未知患者'),
                            patientAge: patient ? patient.age : (data.patientAge || '--'),
                            patientGender: patient ? patient.gender : (data.patientGender || '--'),
                            startTime: data.startTime,
                            endTime: data.endTime,
                            duration: data.startTime && data.endTime ? Math.floor((data.endTime - data.startTime) / 1000) : 0,
                            deviceInfo: data.deviceInfo || {},
                            status: data.endTime ? 'completed' : 'incomplete',
                            riskLevel: getRiskLevel(data.sessionId || key.replace(SESSION_PREFIX, ''), patient ? patient.name : (data.patientName || '')),
                            dataSize: data.dataSize || null,
                            exportTime: data.exportTime || null
                        });
                    } catch (e) {
                        console.warn('Parse session failed:', key);
                    }
                }
            }

            // 按时间倒序
            return reports.sort((a, b) => (b.startTime || 0) - (a.startTime || 0));
        }

        function formatDate(timestamp) {
            if (!timestamp) return '--';
            const d = new Date(timestamp);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '--';
            const d = new Date(timestamp);
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '0分';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            if (m > 0) {
                return `${m}分${s > 0 ? s + '秒' : ''}`;
            }
            return `${s}秒`;
        }

        function isToday(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp);
            const now = new Date();
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
        }

        function isThisWeek(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp);
            const now = new Date();
            const dayDiff = (now - d) / (1000 * 60 * 60 * 24);
            return dayDiff >= 0 && dayDiff <= 7;
        }

        function isThisMonth(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp);
            const now = new Date();
            return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
        }

        function isLast30Days(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp);
            const now = new Date();
            const dayDiff = (now - d) / (1000 * 60 * 60 * 24);
            return dayDiff >= 0 && dayDiff <= 30;
        }

        function getRiskLevel(sessionId, patientName) {
            let seed = 0;
            const str = (patientName || '') + (sessionId || '');
            for (let i = 0; i < str.length; i++) {
                seed = ((seed << 5) - seed) + str.charCodeAt(i);
                seed |= 0;
            }
            let t = seed + 0x6D2B79F5;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            const rng = ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            const score = Math.floor(50 + rng * 45);
            if (score >= 80) return 'low';
            if (score >= 60) return 'medium';
            return 'high';
        }

        function getRiskConfig(level) {
            const configs = {
                low: { label: '低风险', bg: 'bg-green-100', text: 'text-green-600', icon: 'mdi:shield-check' },
                medium: { label: '中度风险', bg: 'bg-yellow-100', text: 'text-yellow-600', icon: 'mdi:alert-circle' },
                high: { label: '高风险', bg: 'bg-red-100', text: 'text-red-600', icon: 'mdi:alert' }
            };
            return configs[level] || configs.medium;
        }

        function isArchived(sessionId) {
            try {
                const list = JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '[]');
                return list.includes(sessionId);
            } catch (e) {
                return false;
            }
        }

        function getFilteredReports() {
            let reports = loadReports();

            // 搜索过滤
            if (searchKeyword.trim()) {
                const kw = searchKeyword.trim().toLowerCase();
                reports = reports.filter(r =>
                    (r.patientName && r.patientName.toLowerCase().includes(kw)) ||
                    (r.sessionId && r.sessionId.toLowerCase().includes(kw))
                );
            }

            // 时间筛选
            if (currentFilter === 'today') {
                reports = reports.filter(r => isToday(r.startTime));
            } else if (currentFilter === 'week') {
                reports = reports.filter(r => isThisWeek(r.startTime));
            } else if (currentFilter === 'month') {
                reports = reports.filter(r => isThisMonth(r.startTime));
            } else if (currentFilter === 'last30days') {
                reports = reports.filter(r => isLast30Days(r.startTime));
            }

            // 桌面端风险等级筛选
            if (desktopStatusFilter && desktopStatusFilter !== 'all') {
                reports = reports.filter(r => r.riskLevel === desktopStatusFilter);
            }

            return reports;
        }

        function getReportId(report) {
            return 'SR-' + report.sessionId;
        }

        function getDataSize(report) {
            if (report.dataSize) return report.dataSize;
            // 无真实数据时回退到估算
            let hash = 0;
            for (let i = 0; i < (report.sessionId || '').length; i++) {
                hash = ((hash << 5) - hash) + report.sessionId.charCodeAt(i);
            }
            return (8 + (Math.abs(hash) % 120) / 10).toFixed(1) + ' MB';
        }

        function updateStats(reports) {
            const total = reports.length;
            const totalDuration = reports.reduce((sum, r) => sum + (r.duration || 0), 0);
            const avg = reports.length > 0 ? Math.floor(totalDuration / reports.length) : 0;

            // 移动端
            const mobileTotal = document.getElementById('total-reports');
            const mobileToday = document.getElementById('today-reports');
            const mobileAvg = document.getElementById('avg-duration');
            if (mobileTotal) mobileTotal.textContent = total;
            if (mobileToday) mobileToday.textContent = reports.filter(r => isToday(r.startTime)).length;
            if (mobileAvg) mobileAvg.textContent = formatDuration(avg);

            // 桌面端
            const desktopTotal = document.getElementById('desktop-total-reports');
            const desktopMonth = document.getElementById('desktop-month-reports');
            const desktopAvg = document.getElementById('desktop-avg-duration');
            if (desktopTotal) desktopTotal.textContent = total;
            if (desktopMonth) desktopMonth.textContent = reports.filter(r => isThisMonth(r.startTime)).length;
            if (desktopAvg) desktopAvg.textContent = formatDuration(avg);
        }

        function renderReports() {
            const reports = getFilteredReports();
            const container = document.getElementById('report-list');
            const desktopContainer = document.getElementById('desktop-report-list');

            updateStats(reports);

            // 更新Tab计数（移动端）
            const allReports = loadReports();
            const tabAll = document.getElementById('tab-all');
            const tabToday = document.getElementById('tab-today');
            const tabWeek = document.getElementById('tab-week');
            const tabMonth = document.getElementById('tab-month');
            if (tabAll) tabAll.textContent = `全部 (${allReports.length})`;
            if (tabToday) tabToday.textContent = `今日 (${allReports.filter(r => isToday(r.startTime)).length})`;
            if (tabWeek) tabWeek.textContent = `本周 (${allReports.filter(r => isThisWeek(r.startTime)).length})`;
            if (tabMonth) tabMonth.textContent = `本月 (${allReports.filter(r => isThisMonth(r.startTime)).length})`;

            // 更新桌面端 tab 样式
            ['all', 'week', 'last30days'].forEach(t => {
                const tab = document.getElementById(`desktop-tab-${t}`);
                if (tab) {
                    if (t === currentFilter) {
                        tab.className = 'desktop-tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-white shadow-sm text-gray-800';
                    } else {
                        tab.className = 'desktop-tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700';
                    }
                }
            });

            // 移动端渲染
            if (container) {
                container.innerHTML = '';
                if (reports.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-gray-400">
                            <iconify-icon icon="mdi:file-document-outline" width="48" class="mx-auto mb-2 opacity-50"></iconify-icon>
                            <p class="text-sm">暂无符合条件的报告</p>
                            <p class="text-xs mt-1">完成评估后将自动生成报告</p>
                        </div>
                    `;
                } else {
                    reports.forEach(r => {
                        const cfg = getRiskConfig(r.riskLevel);
                        const dateStr = formatDate(r.startTime);
                        const timeStr = formatTime(r.startTime);
                        const durationStr = formatDuration(r.duration);

                        const archived = isArchived(r.sessionId);
                        const card = document.createElement('div');
                        card.className = 'report-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer';
                        card.onclick = () => {
                            window.location.href = 'assessment-report.html?sessionId=' + r.sessionId;
                        };
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-sm">
                                        ${r.patientName.charAt(0)}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-sm">${r.patientName}</h3>
                                        <p class="text-[10px] text-gray-400">${r.patientAge}岁 · ${r.patientGender}</p>
                                    </div>
                                </div>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="${cfg.bg} ${cfg.text} px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1">
                                        <iconify-icon icon="${cfg.icon}" width="12"></iconify-icon>
                                        ${cfg.label}
                                    </span>
                                    ${archived ? `<span class="bg-yellow-50 text-yellow-600 px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1"><iconify-icon icon="mdi:archive" width="12"></iconify-icon>已存档</span>` : ''}
                                </div>
                            </div>
                            <div class="flex justify-between items-center text-xs text-gray-500 mt-3 pt-3 border-t border-gray-50">
                                <div class="flex items-center gap-2">
                                    <span class="font-mono text-[10px] bg-gray-100 px-1.5 py-0.5 rounded">${getReportId(r)}</span>
                                    <span class="flex items-center gap-1">
                                        <iconify-icon icon="mdi:calendar" width="14"></iconify-icon>
                                        ${dateStr}
                                    </span>
                                </div>
                                <span class="flex items-center gap-1">
                                    <iconify-icon icon="mdi:timer-outline" width="14"></iconify-icon>
                                    ${durationStr}
                                </span>
                            </div>
                            ${isEditMode ? `
                            <div class="flex gap-2 mt-2">
                                <button onclick="event.stopPropagation(); deleteReport('${r.sessionId}')" class="flex-1 bg-red-50 text-red-600 py-1.5 rounded-lg text-[10px] font-bold hover:bg-red-100 transition-colors">删除</button>
                            </div>
                            ` : ''}
                        `;
                        container.appendChild(card);
                    });
                }
            }

            // 桌面端渲染
            if (desktopContainer) {
                desktopContainer.innerHTML = '';
                if (reports.length === 0) {
                    desktopContainer.innerHTML = `
                        <tr>
                            <td colspan="6" class="py-12 text-center text-gray-400">
                                <iconify-icon icon="mdi:file-document-outline" width="48" class="mx-auto mb-2 opacity-50"></iconify-icon>
                                <p class="text-sm">暂无符合条件的报告</p>
                                <p class="text-xs mt-1">完成评估后将自动生成报告</p>
                            </td>
                        </tr>
                    `;
                } else {
                    reports.forEach(r => {
                        const cfg = getRiskConfig(r.riskLevel);
                        const dateStr = formatDate(r.startTime);
                        const timeStr = formatTime(r.startTime);
                        const row = document.createElement('tr');
                        row.className = 'border-b border-gray-50 hover:bg-gray-50 transition-colors';
                        row.innerHTML = `
                            <td class="py-4 px-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-sm">
                                        ${r.patientName.charAt(0)}
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-800">${r.patientName}</p>
                                        <p class="text-xs text-gray-400">${r.patientAge}岁 · ${r.patientGender}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="py-4 px-4 text-gray-600">
                                <div class="flex flex-col">
                                    <span>${dateStr}</span>
                                    <span class="text-xs text-gray-400">${timeStr}</span>
                                </div>
                            </td>
                            <td class="py-4 px-4 text-gray-600 font-mono text-xs">${getReportId(r)}</td>
                            <td class="py-4 px-4 text-gray-600">${getDataSize(r)}</td>
                            <td class="py-4 px-4">
                                <span class="${cfg.bg} ${cfg.text} px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 w-fit">
                                    <iconify-icon icon="${cfg.icon}" width="14"></iconify-icon>
                                    ${cfg.label}
                                </span>
                            </td>
                            <td class="py-4 px-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <a href="assessment-report.html?sessionId=${r.sessionId}" class="inline-flex items-center gap-1 px-3 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors">
                                        <iconify-icon icon="mdi:eye" width="14"></iconify-icon>
                                    </a>
                                    ${isEditMode ? `
                                    <button onclick="event.stopPropagation(); deleteReport('${r.sessionId}')" class="inline-flex items-center gap-1 px-3 py-2 bg-red-50 text-red-600 rounded-lg text-xs font-bold hover:bg-red-100 transition-colors">
                                        <iconify-icon icon="mdi:delete" width="14"></iconify-icon>
                                    </button>
                                    ` : ''}
                                </div>
                            </td>
                        `;
                        desktopContainer.appendChild(row);
                    });
                }
            }
        }

        function filterReports(type) {
            currentFilter = type;
            ['all', 'today', 'week', 'month'].forEach(t => {
                const tab = document.getElementById(`tab-${t}`);
                if (tab) {
                    if (t === type) {
                        tab.className = 'pb-2 border-b-2 border-blue-600 text-blue-600';
                    } else {
                        tab.className = 'pb-2 text-gray-500';
                    }
                }
            });
            renderReports();
        }

        function filterDesktopReports(type) {
            currentFilter = type;
            renderReports();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const mobileBtn = document.getElementById('mobile-edit-toggle');
            const desktopBtn = document.getElementById('desktop-edit-toggle');
            if (mobileBtn) mobileBtn.textContent = isEditMode ? '完成' : '编辑';
            if (desktopBtn) desktopBtn.textContent = isEditMode ? '完成' : '编辑';
            if (desktopBtn) {
                desktopBtn.className = isEditMode
                    ? 'px-4 py-2 bg-blue-100 rounded-xl text-sm font-medium text-blue-700 hover:bg-blue-200 transition-colors'
                    : 'px-4 py-2 bg-gray-100 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-200 transition-colors';
            }
            renderReports();
        }

        function filterDesktopStatus(status) {
            desktopStatusFilter = status;
            renderReports();
        }

        // 移动端搜索
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                searchKeyword = e.target.value;
                renderReports();
            });
        }

        // 桌面端搜索
        const desktopSearchInput = document.getElementById('desktop-search-input');
        if (desktopSearchInput) {
            desktopSearchInput.addEventListener('input', function(e) {
                searchKeyword = e.target.value;
                renderReports();
            });
        }

        // 报告详情
        function openDetail(report) {
            const cfg = getStatusConfig(report.status);
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');

            content.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-gray-800">评估报告详情</h2>
                    <button onclick="closeDetail()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
                        <iconify-icon icon="mdi:close" width="20"></iconify-icon>
                    </button>
                </div>

                <div class="flex items-center gap-4 mb-6">
                    <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xl">
                        ${report.patientName.charAt(0)}
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 text-lg">${report.patientName}</h3>
                        <p class="text-xs text-gray-500">${report.patientAge}岁 · ${report.patientGender}</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <p class="text-xs text-gray-400 mb-1">报告编号</p>
                        <p class="text-sm font-mono font-medium text-gray-700">${report.sessionId}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 mb-1">评估日期</p>
                            <p class="text-sm font-medium text-gray-700">${formatDate(report.startTime)}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 mb-1">开始时间</p>
                            <p class="text-sm font-medium text-gray-700">${formatTime(report.startTime)}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 mb-1">评估时长</p>
                            <p class="text-sm font-medium text-gray-700">${formatDuration(report.duration)}</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl">
                            <p class="text-xs text-gray-400 mb-1">报告状态</p>
                            <p class="text-sm font-medium ${cfg.text}">${cfg.label}</p>
                        </div>
                    </div>

                    ${report.deviceInfo && report.deviceInfo.platform ? `
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <p class="text-xs text-gray-400 mb-2">设备信息</p>
                        <div class="space-y-1 text-xs text-gray-600">
                            <p>平台：${report.deviceInfo.platform || '--'}</p>
                            <p>屏幕：${report.deviceInfo.screenWidth || '--'} x ${report.deviceInfo.screenHeight || '--'}</p>
                            <p>语言：${report.deviceInfo.language || '--'}</p>
                        </div>
                    </div>
                    ` : ''}

                    <div class="pt-2">
                        <button onclick="closeDetail()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">
                            关闭
                        </button>
                    </div>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        // 点击遮罩关闭
        const detailModal = document.getElementById('detail-modal');
        if (detailModal) {
            detailModal.addEventListener('click', function(e) {
                if (e.target === this) closeDetail();
            });
        }

        // ===== 编辑报告 =====
        function editReport(sessionId) {
            const sessionKey = SESSION_PREFIX + sessionId;
            const dataStr = localStorage.getItem(sessionKey);
            if (!dataStr) {
                alert('报告数据不存在');
                return;
            }
            let data;
            try {
                data = JSON.parse(dataStr);
            } catch (e) {
                alert('报告数据解析失败');
                return;
            }

            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('edit-content');
            content.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-gray-800">编辑报告信息</h2>
                    <button onclick="closeEdit()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
                        <iconify-icon icon="mdi:close" width="20"></iconify-icon>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">患者姓名</label>
                        <input type="text" id="edit-name" value="${data.patientName || ''}" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">年龄</label>
                            <input type="text" id="edit-age" value="${data.patientAge || ''}" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">性别</label>
                            <select id="edit-gender" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="男" ${data.patientGender === '男' ? 'selected' : ''}>男</option>
                                <option value="女" ${data.patientGender === '女' ? 'selected' : ''}>女</option>
                            </select>
                        </div>
                    </div>
                    <div class="pt-2 flex gap-3">
                        <button onclick="closeEdit()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-200 transition-colors">取消</button>
                        <button onclick="saveEdit('${sessionId}')" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">保存</button>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        }

        function closeEdit() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function saveEdit(sessionId) {
            const sessionKey = SESSION_PREFIX + sessionId;
            const dataStr = localStorage.getItem(sessionKey);
            if (!dataStr) return;
            let data;
            try {
                data = JSON.parse(dataStr);
            } catch (e) { return; }

            const newName = document.getElementById('edit-name').value.trim();
            const newAge = document.getElementById('edit-age').value.trim();
            const newGender = document.getElementById('edit-gender').value;

            if (!newName) {
                alert('患者姓名不能为空');
                return;
            }

            data.patientName = newName;
            data.patientAge = newAge;
            data.patientGender = newGender;
            localStorage.setItem(sessionKey, JSON.stringify(data));

            // 同步更新 portal_patients 中对应患者
            if (data.patientId) {
                try {
                    const patients = JSON.parse(localStorage.getItem(PATIENTS_KEY) || '[]');
                    const patient = patients.find(p => String(p.id) === String(data.patientId));
                    if (patient) {
                        patient.name = newName;
                        patient.age = newAge;
                        patient.gender = newGender;
                        localStorage.setItem(PATIENTS_KEY, JSON.stringify(patients));
                    }
                } catch (e) {
                    console.warn('同步更新患者信息失败', e);
                }
            }

            closeEdit();
            renderReports();
        }

        const editModal = document.getElementById('edit-modal');
        if (editModal) {
            editModal.addEventListener('click', function(e) {
                if (e.target === this) closeEdit();
            });
        }

        // ===== 删除报告 =====
        function deleteReport(sessionId) {
            if (!confirm('确定要删除该报告吗？此操作不可恢复。')) return;
            const sessionKey = SESSION_PREFIX + sessionId;
            try {
                localStorage.removeItem(sessionKey);
                renderReports();
            } catch (e) {
                alert('删除失败');
            }
        }

        // 初始化渲染
        renderReports();
    </script>
</body>
</html>
