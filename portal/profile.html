<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>个人中心 - 智慧忆护</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .app-container {
            width: 375px;
            height: 812px;
            background: #f8fafc;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="app-container flex flex-col">
        <!-- 顶部状态栏 -->
        <div class="px-6 pt-4 pb-2 flex justify-between items-center text-xs font-bold bg-white">
            <span id="clock">09:41</span>
            <div class="flex gap-1">
                <iconify-icon class="text-gray-800" icon="mdi:signal"></iconify-icon>
                <iconify-icon class="text-gray-800" icon="mdi:wifi"></iconify-icon>
                <iconify-icon class="text-gray-800" icon="mdi:battery"></iconify-icon>
            </div>
        </div>

        <!-- 顶部导航 -->
        <div class="px-5 py-4 bg-white shadow-sm flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-800">个人中心</h1>
            <iconify-icon class="text-gray-400 cursor-pointer" icon="mdi:cog-outline" width="24"></iconify-icon>
        </div>

        <div class="flex-1 overflow-y-auto scroll-container pb-24">
            <!-- 用户信息卡片 -->
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 mx-4 mt-4 p-6 rounded-3xl text-white shadow-xl shadow-blue-200">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center border-2 border-white/30">
                        <iconify-icon icon="mdi:account" width="32" class="text-white"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <h2 class="text-lg font-bold" id="user-name">社区医生</h2>
                        <p class="text-xs text-blue-100 mt-1" id="user-role">工号：<span id="user-id">--</span></p>
                        <p class="text-xs text-blue-100">所属机构：社区健康服务中心</p>
                    </div>
                </div>
                <div class="flex justify-around mt-6 pt-4 border-t border-white/20">
                    <div class="text-center">
                        <p class="text-xl font-bold" id="stat-assessment">0</p>
                        <p class="text-xs text-blue-100">完成评估</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xl font-bold" id="stat-patients">0</p>
                        <p class="text-xs text-blue-100">管理患者</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xl font-bold" id="stat-days">1</p>
                        <p class="text-xs text-blue-100">工作天数</p>
                    </div>
                </div>
            </div>

            <!-- 功能菜单 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <a href="dashboard.html" class="flex items-center gap-4 p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
                        <iconify-icon icon="mdi:home-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">工作台</p>
                        <p class="text-xs text-gray-400">返回主界面</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </a>
                <a href="patients.html" class="flex items-center gap-4 p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center text-green-600">
                        <iconify-icon icon="mdi:account-group-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">患者管理</p>
                        <p class="text-xs text-gray-400">查看和管理患者信息</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </a>
                <a href="report.html" class="flex items-center gap-4 p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
                    <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-600">
                        <iconify-icon icon="mdi:file-chart-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">报告查询</p>
                        <p class="text-xs text-gray-400">查看历史评估报告</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </a>
                <a href="realtime.html" class="flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors">
                    <div class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-orange-600">
                        <iconify-icon icon="mdi:monitor-eye" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">实时监测</p>
                        <p class="text-xs text-gray-400">查看实时评估状态</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </a>
            </div>

            <!-- 系统设置 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div class="flex items-center gap-4 p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors cursor-pointer" onclick="toggleSound()">
                    <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-600">
                        <iconify-icon icon="mdi:volume-high" width="20" id="sound-icon"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">声音提示</p>
                        <p class="text-xs text-gray-400">开启或关闭操作音效</p>
                    </div>
                    <div class="w-10 h-6 bg-blue-600 rounded-full relative cursor-pointer" id="sound-toggle">
                        <div class="w-4 h-4 bg-white rounded-full absolute top-1 right-1 transition-all"></div>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-4 hover:bg-gray-50 transition-colors cursor-pointer" onclick="clearCache()">
                    <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600">
                        <iconify-icon icon="mdi:trash-can-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">清除缓存</p>
                        <p class="text-xs text-gray-400">清除本地报告缓存数据</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </div>
            </div>

            <!-- 关于 -->
            <div class="mx-4 mt-4 bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div class="flex items-center gap-4 p-4 border-b border-gray-50">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
                        <iconify-icon icon="mdi:information-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">关于系统</p>
                        <p class="text-xs text-gray-400">智慧忆护 AD-Care v1.0.0</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-4">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
                        <iconify-icon icon="mdi:shield-check-outline" width="20"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800">隐私政策</p>
                        <p class="text-xs text-gray-400">查看数据隐私保护说明</p>
                    </div>
                    <iconify-icon class="text-gray-300" icon="mdi:chevron-right" width="20"></iconify-icon>
                </div>
            </div>

            <!-- 退出登录 -->
            <div class="mx-4 mt-4 mb-8">
                <button onclick="logout()" class="w-full bg-white border border-red-100 text-red-600 py-4 rounded-2xl font-bold hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                    <iconify-icon icon="mdi:logout" width="20"></iconify-icon>
                    退出登录
                </button>
            </div>
        </div>

        <!-- 底部导航栏 -->
        <div class="absolute bottom-0 left-0 right-0 bg-white h-20 border-t border-gray-100 flex items-center justify-around pb-4">
            <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <iconify-icon icon="mdi:home" width="24"></iconify-icon>
                <span class="text-[10px] mt-1">工作台</span>
            </a>
            <a href="patients.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <iconify-icon icon="mdi:account-group" width="24"></iconify-icon>
                <span class="text-[10px] mt-1">患者列表</span>
            </a>
            <a href="report.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <iconify-icon icon="mdi:file-chart" width="24"></iconify-icon>
                <span class="text-[10px] mt-1">报告查询</span>
            </a>
            <div class="flex flex-col items-center text-blue-600">
                <iconify-icon icon="mdi:account" width="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-bold">我的</span>
            </div>
        </div>
    </div>

    <script>
        // 登录状态检查
        if (sessionStorage.getItem('portal_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        // 更新时间和日期
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        // 加载用户信息
        function loadUserInfo() {
            const username = localStorage.getItem('portal_username');
            if (username) {
                document.getElementById('user-name').textContent = username;
                document.getElementById('user-id').textContent = username;
            }
        }
        loadUserInfo();

        // 加载统计数据
        function loadStats() {
            const patients = JSON.parse(localStorage.getItem('portal_patients') || '[]');
            document.getElementById('stat-patients').textContent = patients.length;

            let assessmentCount = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('adcare_session_')) {
                    assessmentCount++;
                }
            }
            document.getElementById('stat-assessment').textContent = assessmentCount;
        }
        loadStats();

        // 声音提示开关
        let soundEnabled = localStorage.getItem('sound_enabled') !== 'false';
        function updateSoundToggle() {
            const toggle = document.getElementById('sound-toggle');
            const icon = document.getElementById('sound-icon');
            if (soundEnabled) {
                toggle.classList.remove('bg-gray-300');
                toggle.classList.add('bg-blue-600');
                toggle.querySelector('div').style.right = '4px';
                toggle.querySelector('div').style.left = 'auto';
                icon.setAttribute('icon', 'mdi:volume-high');
            } else {
                toggle.classList.remove('bg-blue-600');
                toggle.classList.add('bg-gray-300');
                toggle.querySelector('div').style.left = '4px';
                toggle.querySelector('div').style.right = 'auto';
                icon.setAttribute('icon', 'mdi:volume-off');
            }
        }
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('sound_enabled', soundEnabled);
            updateSoundToggle();
        }
        updateSoundToggle();

        // 清除缓存
        function clearCache() {
            if (confirm('确定要清除所有报告缓存数据吗？此操作不可恢复。')) {
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('adcare_report_cache_')) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(key => localStorage.removeItem(key));
                alert('缓存已清除');
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                sessionStorage.removeItem('portal_logged_in');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
