<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>模拟API测试页面 - 智慧忆护</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="mock-api.js"></script>
    <style>
        body { background-color: #f0f4f8; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .score-display { font-size: 48px; font-weight: bold; color: #2563eb; margin: 20px 0; }
        .level-tag { padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; color: white; }
        .risk-0 { background-color: #10b981; }
        .risk-1 { background-color: #f59e0b; }
        .risk-2 { background-color: #f97316; }
        .risk-3 { background-color: #ef4444; }
        .dimension-item { margin: 10px 0; padding: 10px; background: #f8fafc; border-radius: 8px; }
        .progress-bar { width: 100%; height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; transition: width 0.3s ease; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-2xl font-bold mb-4">模拟API测试页面</h1>
        
        <div class="card">
            <h2 class="text-xl font-bold mb-2">综合风险评估结果</h2>
            <div id="score-display" class="score-display">--</div>
            <div id="risk-level" class="level-tag">--</div>
            <p id="risk-summary" class="mt-4"></p>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-2">语言与认知维度</h2>
            <div class="dimension-item">
                <div class="flex justify-between">
                    <span>评估等级:</span>
                    <span id="language-level" class="font-bold">--</span>
                </div>
                <div class="progress-bar">
                    <div id="language-progress" class="progress-fill"></div>
                </div>
                <div class="flex justify-between">
                    <span>百分比:</span>
                    <span id="language-percentage" class="font-bold">--%</span>
                </div>
                <p id="language-description" class="mt-2 text-sm text-gray-600"></p>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-2">临床干预建议</h2>
            <ul id="suggestions-list" class="list-disc pl-5 space-y-1"></ul>
        </div>

        <div class="card">
            <button id="generate-btn" class="btn">生成新的随机评估报告</button>
            <div id="loading" class="mt-4 hidden">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-blue-600 border-t-transparent"></div>
                <span class="ml-2">正在生成报告...</span>
            </div>
        </div>
    </div>

    <script>
        async function generateAndDisplayReport() {
            const generateBtn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading');
            
            // 显示加载状态
            generateBtn.disabled = true;
            loading.classList.remove('hidden');
            
            try {
                // 调用模拟API
                const report = await fetchAssessmentReport();
                
                // 显示综合风险评估结果
                document.getElementById('score-display').textContent = `${report.score}/100`;
                document.getElementById('risk-level').textContent = `${report.riskAssessment.level} (${report.riskAssessment.grade})`;
                document.getElementById('risk-level').className = `level-tag risk-${report.riskAssessment.grade.split(' ')[1]}`;
                document.getElementById('risk-summary').innerHTML = report.riskAssessment.summary;
                
                // 显示语言与认知维度
                document.getElementById('language-level').textContent = report.languageCognition.level;
                document.getElementById('language-percentage').textContent = `${report.languageCognition.percentage}%`;
                document.getElementById('language-description').textContent = report.languageCognition.description;
                
                // 设置进度条
                const progressBar = document.getElementById('language-progress');
                progressBar.style.width = `${report.languageCognition.percentage}%`;
                progressBar.style.backgroundColor = report.riskAssessment.bar.replace('bg-', '').replace('-400', '');
                
                // 显示临床干预建议
                const suggestionsList = document.getElementById('suggestions-list');
                suggestionsList.innerHTML = '';
                report.interventionSuggestions.forEach(suggestion => {
                    const li = document.createElement('li');
                    li.innerHTML = suggestion;
                    suggestionsList.appendChild(li);
                });
                
                console.log('完整报告数据:', report);
            } catch (error) {
                console.error('生成报告失败:', error);
                alert('生成报告失败，请检查控制台日志');
            } finally {
                // 隐藏加载状态
                generateBtn.disabled = false;
                loading.classList.add('hidden');
            }
        }
        
        // 页面加载时生成第一个报告
        document.addEventListener('DOMContentLoaded', generateAndDisplayReport);
        
        // 绑定按钮点击事件
        document.getElementById('generate-btn').addEventListener('click', generateAndDisplayReport);
    </script>
</body>
</html>
